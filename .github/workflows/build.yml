name: Android CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Ensure Android SDK platform 36 + matching build-tools are installed
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" \
                     "platforms;android-36" "platforms;android-35" \
                     "build-tools;36.0.0" "build-tools;35.0.0" || true

      # AGP 8.6.1 (used in build.gradle.kts) is only compatible with Gradle 8.7-8.10.
      # The runner's ambient/default "gradle" can resolve to a much newer major version
      # (observed: 9.x) which breaks the build - so we pin an explicit, known-compatible
      # version here instead of relying on whatever setup-gradle defaults to.
      - name: Setup Gradle 8.9
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.9

      - name: Build debug APK
        id: build
        run: |
          set +e
          gradle assembleDebug --stacktrace --info > /tmp/build_output.log 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          tail -n 400 /tmp/build_output.log
          exit 0

      # Log storage on GitHub's own Actions UI lives on an Azure blob host that isn't
      # reachable from every automated environment, so we also persist the raw output
      # as a plain file in the repo (readable via raw.githubusercontent.com) whenever
      # the build did not succeed, to make remote debugging possible.
      - name: Commit build log for diagnostics (only on failure)
        if: always()
        run: |
          if [ "${{ steps.build.outputs.exit_code }}" != "0" ]; then
            mkdir -p ci-logs
            cp /tmp/build_output.log ci-logs/last-build-failure.log
            git config user.email "ci@atakolstudio.dev"
            git config user.name "CI Bot"
            git add ci-logs/last-build-failure.log
            git commit -m "ci: update last-build-failure.log" || echo "nothing to commit"
            git push || echo "push failed, continuing"
          fi

      - name: Fail the job if the build actually failed
        if: always()
        run: |
          if [ "${{ steps.build.outputs.exit_code }}" != "0" ]; then
            echo "Gradle build failed with exit code ${{ steps.build.outputs.exit_code }}"
            exit 1
          fi

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
